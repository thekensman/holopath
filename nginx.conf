# ═══ HoloPath — Nginx Configuration (Static Site) ═══
# All hologram processing happens client-side in the browser.
# No backend server needed — just serve static files.
#
# Install: cp nginx.conf /etc/nginx/sites-available/holopath
#          ln -sf /etc/nginx/sites-available/holopath /etc/nginx/sites-enabled/

# ─── HTTP: redirect everything to HTTPS ─────────
server {
    listen 80;
    server_name holopath.art www.holopath.art;
    return 301 https://holopath.art$request_uri;
}

# ─── www → apex redirect (HTTPS) ────────────────
server {
    listen 443 ssl http2;
    server_name www.holopath.art;

    ssl_certificate /etc/letsencrypt/live/holopath.art/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/holopath.art/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://holopath.art$request_uri;
}

# ─── Main HTTPS server ──────────────────────────
server {
    listen 443 ssl http2;
    server_name holopath.art;

    ssl_certificate /etc/letsencrypt/live/holopath.art/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/holopath.art/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/holopath/dist;
    index index.html;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml
               image/svg+xml;

    # ─── ads.txt (must be text/plain) ───
    location = /ads.txt {
        default_type text/plain;
    }

    # ─── Static assets with long cache ───
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ─── Clean URLs + static fallback ───
    location / {
        try_files $uri $uri.html $uri/ =404;
    }
}
